<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="KB favicon">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <rect x="16" y="16" width="96" height="96" rx="24" fill="url(#g)" opacity="0.18"/>
  <g filter="url(#glow)">
    <text x="64" y="78" text-anchor="middle" font-family="Orbitron, Poppins, Arial, sans-serif" font-size="54" font-weight="700" fill="url(#g)">KB</text>
  </g>
</svg>
